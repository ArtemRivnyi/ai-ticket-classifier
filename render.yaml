services:
  - type: web
    name: ai-ticket-classifier
    env: docker
    envVars:
      - key: FLASK_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MASTER_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: API_KEY_SALT
        generateValue: true
      - key: SENTRY_DSN
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: ticket-classifier-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: ticket-classifier-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: FORCE_HTTPS
        value: "true"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false

  - type: redis
    name: ticket-classifier-redis
    ipAllowList: [] # Only allow internal connections
    plan: free # Use free tier if available, otherwise starter

  - type: psql
    name: ticket-classifier-db
    env: docker
    plan: free # Free tier for 90 days
    databaseName: ai_ticket_classifier
    user: classifier

databases:
  - name: ticket-classifier-db
    plan: free
    databaseName: ai_ticket_classifier
    user: classifier
