services:
  # Main Flask API
  - type: web
    name: ai-ticket-classifier-api
    env: python
    region: frankfurt
    plan: starter
    branch: GEMINI_API_PROD_READY
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 4 --timeout 120 app:app
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: FLASK_ENV
        value: production
      - key: FORCE_HTTPS
        value: true
      - key: GEMINI_API_KEY
        sync: false
      - key: MASTER_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: ai-ticket-classifier-redis
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
    
  # Redis for caching and rate limiting
  - type: redis
    name: ai-ticket-classifier-redis
    region: frankfurt
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
