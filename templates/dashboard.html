<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AI Ticket Classifier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .sidebar {
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 20px;
            background-color: #343a40;
            color: white;
            width: 250px;
        }

        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 1.1rem;
            color: #818181;
            display: block;
        }

        .sidebar a:hover {
            color: #f1f1f1;
            background-color: #495057;
        }

        .sidebar .active {
            color: white;
            background-color: #0d6efd;
        }

        .main-content {
            margin-left: 250px;
            padding: 20px;
        }

        .card-stat {
            border-left: 5px solid #0d6efd;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h4 class="text-center mb-4">AI Classifier</h4>
        <a href="/dashboard" class="active"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
        <a href="/billing"><i class="bi bi-credit-card me-2"></i> Billing</a>
        <a href="#" onclick="alert('Coming soon!')"><i class="bi bi-gear me-2"></i> Settings</a>
        <a href="#" id="logoutBtn" class="mt-5"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container-fluid">
            <div class="row mb-4">
                <div class="col-12">
                    <h2 id="welcomeMsg">Welcome back!</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-stat shadow-sm" style="border-left-color: #ffc107;">
                <div class="card-body">
                    <h5 class="card-title text-muted">Active API Keys</h5>
                    <h2 class="card-text" id="activeKeysCount">0</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- API Keys Section -->
    <div class="row">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center bg-white">
                    <h5 class="mb-0">API Keys</h5>
                    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#createKeyModal">
                        <i class="bi bi-plus-lg"></i> Create New Key
                    </button>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover" id="keysTable">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Prefix</th>
                                    <th>Created</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="keysTableBody">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h5 class="modal-title">Create New API Key</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                    </div>
                                    <div class="modal-body">
                                        <form id="createKeyForm">
                                            <div class="mb-3">
                                                <label for="keyName" class="form-label">Key Name</label>
                                                <input type="text" class="form-control" id="keyName"
                                                    placeholder="e.g. Production App" required>
                                            </div>
                                        </form>
                                        <div id="newKeyDisplay" class="d-none">
                                            <div class="alert alert-success">
                                                <p class="mb-1"><strong>Key Created!</strong> Copy it now, you won't see
                                                    it again.</p>
                                                <div class="input-group">
                                                    <input type="text" class="form-control font-monospace"
                                                        id="newKeyValue" readonly>
                                                    <button class="btn btn-outline-secondary"
                                                        onclick="navigator.clipboard.writeText(document.getElementById('newKeyValue').value)">Copy</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary"
                                            data-bs-dismiss="modal">Close</button>
                                        <button type="button" class="btn btn-primary" id="saveKeyBtn">Create
                                            Key</button>
                                    </div>
                                </div>
                    </div>
                </div>

                <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
                <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>

</html>
