<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AI Ticket Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-white transition-colors duration-200 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center gap-2">
                        <span class="text-xl font-bold text-slate-800 dark:text-white tracking-tight">Ticket<span
                                class="text-indigo-600 dark:text-indigo-400">AI</span></span>
                    </a>
                    <div class="hidden md:flex ml-10 space-x-8">
                        <a href="/dashboard"
                            class="text-indigo-600 dark:text-indigo-400 px-3 py-2 rounded-md text-sm font-medium transition">Dashboard</a>
                        <a href="/billing"
                            class="text-slate-500 hover:text-indigo-600 dark:text-indigo-400 px-3 py-2 rounded-md text-sm font-medium transition">Billing</a>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button id="themeToggle"
                        class="p-2 text-slate-400 hover:text-indigo-600 dark:text-slate-500 dark:hover:text-indigo-400 transition"
                        title="Toggle Dark Mode">
                        <span id="themeIcon">🌙</span>
                    </button>
                    <a href="#" id="logoutBtn"
                        class="text-sm text-slate-500 hover:text-red-600 dark:text-slate-400 dark:hover:text-red-400 transition">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8 max-w-5xl">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-slate-900 dark:text-white" id="welcomeMsg">Welcome back!</h2>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border-l-4 border-indigo-600 p-6">
                <h5 class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-1">Active
                    API Keys</h5>
                <h2 class="text-3xl font-bold text-slate-900 dark:text-white" id="activeKeysCount">0</h2>
            </div>
            <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border-l-4 border-green-500 p-6">
                <h5 class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-1">Current
                    Tier</h5>
                <h2 class="text-3xl font-bold text-slate-900 dark:text-white capitalize" id="currentTier">-</h2>
            </div>
            <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border-l-4 border-sky-500 p-6">
                <h5 class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-1">API
                    Requests (Today)</h5>
                <h2 class="text-3xl font-bold text-slate-900 dark:text-white" id="requestsToday">- / -</h2>
            </div>
        </div>

        <!-- API Keys Section -->
        <div
            class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
            <div
                class="px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50">
                <h5 class="font-semibold text-slate-900 dark:text-white">API Keys</h5>
                <button id="openCreateKeyModalBtn"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2 px-4 rounded-lg transition shadow-sm dark:bg-indigo-500 dark:hover:bg-indigo-600">
                    + Create New Key
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200 dark:divide-slate-700" id="keysTable">
                    <thead class="bg-slate-50 dark:bg-slate-700">
                        <tr>
                            <th
                                class="px-6 py-3 text-left text-xs font-medium text-slate-500 dark:text-slate-300 uppercase tracking-wider">
                                Name</th>
                            <th
                                class="px-6 py-3 text-left text-xs font-medium text-slate-500 dark:text-slate-300 uppercase tracking-wider">
                                Prefix</th>
                            <th
                                class="px-6 py-3 text-left text-xs font-medium text-slate-500 dark:text-slate-300 uppercase tracking-wider">
                                Created</th>
                            <th
                                class="px-6 py-3 text-left text-xs font-medium text-slate-500 dark:text-slate-300 uppercase tracking-wider">
                                Status</th>
                            <th
                                class="px-6 py-3 text-left text-xs font-medium text-slate-500 dark:text-slate-300 uppercase tracking-wider">
                                Actions</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white dark:bg-slate-800 divide-y divide-slate-200 dark:divide-slate-700"
                        id="keysTableBody">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Create Key Modal -->
    <div id="createKeyModal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title"
        role="dialog" aria-modal="true">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-slate-900 bg-opacity-75 transition-opacity" aria-hidden="true"
                id="modalBackdrop"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div
                class="inline-block align-bottom bg-white dark:bg-slate-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full border border-slate-200 dark:border-slate-700">
                <div class="bg-white dark:bg-slate-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="sm:flex sm:items-start">
                        <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left w-full">
                            <h3 class="text-lg leading-6 font-medium text-slate-900 dark:text-white" id="modal-title">
                                Create New API Key</h3>
                            <div class="mt-4">
                                <form id="createKeyForm">
                                    <div class="mb-4">
                                        <label for="keyName"
                                            class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Key
                                            Name</label>
                                        <input type="text"
                                            class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white dark:bg-slate-700 dark:text-white transition-colors"
                                            id="keyName" placeholder="e.g. Production App" required>
                                    </div>
                                </form>
                                <div id="newKeyDisplay" class="hidden mt-4">
                                    <div
                                        class="bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-800 rounded-lg p-4">
                                        <p class="text-sm text-green-800 dark:text-green-200 mb-2 font-medium">Key
                                            Created! Copy it now, you won't see it again.</p>
                                        <div class="flex gap-2">
                                            <input type="text"
                                                class="flex-1 px-3 py-2 border border-green-300 dark:border-green-700 rounded-lg bg-white dark:bg-slate-800 text-slate-900 dark:text-white font-mono text-sm"
                                                id="newKeyValue" readonly>
                                            <button
                                                class="px-3 py-2 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-600 transition"
                                                onclick="navigator.clipboard.writeText(document.getElementById('newKeyValue').value)">Copy</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-slate-50 dark:bg-slate-700/50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button type="button"
                        class="w-full inline-flex justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:ml-3 sm:w-auto sm:text-sm dark:bg-indigo-500 dark:hover:bg-indigo-600"
                        id="saveKeyBtn">Create Key</button>
                    <button type="button"
                        class="mt-3 w-full inline-flex justify-center rounded-lg border border-slate-300 dark:border-slate-600 shadow-sm px-4 py-2 bg-white dark:bg-slate-800 text-base font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm"
                        id="closeModalBtn">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>

</html>
