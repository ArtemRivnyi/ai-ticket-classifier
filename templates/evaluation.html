<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Evaluation - AI Ticket Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-2xl font-bold text-slate-800 hover:text-indigo-600 transition">🎫 AI Ticket
                        Classifier</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-slate-600 hover:text-indigo-600 font-medium transition">Home</a>
                    <a href="/about" class="text-slate-600 hover:text-indigo-600 font-medium transition">About</a>
                    <a href="/docs" class="text-slate-600 hover:text-indigo-600 font-medium transition">API Docs</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-12 max-w-6xl">

        <div class="text-center mb-12">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-4">Model Evaluation</h1>
            <p class="text-slate-600">Performance metrics against a curated test dataset of 30 diverse tickets.</p>
            <p class="text-xs text-slate-400 mt-2">Last run: <span id="lastRunTime">-</span></p>
        </div>

        <!-- Metrics Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 text-center">
                <p class="text-sm text-slate-500 uppercase tracking-wide font-semibold mb-2">Accuracy</p>
                <p id="metricAccuracy" class="text-4xl font-bold text-indigo-600">-</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 text-center">
                <p class="text-sm text-slate-500 uppercase tracking-wide font-semibold mb-2">Total Tickets</p>
                <p id="metricTotal" class="text-4xl font-bold text-slate-800">-</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 text-center">
                <p class="text-sm text-slate-500 uppercase tracking-wide font-semibold mb-2">Correct</p>
                <p id="metricCorrect" class="text-4xl font-bold text-green-600">-</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 text-center">
                <p class="text-sm text-slate-500 uppercase tracking-wide font-semibold mb-2">Avg Latency</p>
                <p id="metricLatency" class="text-4xl font-bold text-slate-800">-</p>
            </div>
        </div>

        <!-- Detailed Results Table -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-200 bg-slate-50">
                <h3 class="font-bold text-slate-800">Detailed Results</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50">
                        <tr>
                            <th scope="col"
                                class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">
                                Ticket</th>
                            <th scope="col"
                                class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">
                                Expected</th>
                            <th scope="col"
                                class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">
                                Predicted</th>
                            <th scope="col"
                                class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">
                                Confidence</th>
                            <th scope="col"
                                class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">
                                Result</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody" class="bg-white divide-y divide-slate-200">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // In a real app, this would be an API call. 
                // For this demo, we'll load the JSON file directly if served statically, 
                // or we can embed the data if we use a template.
                // Since we are using Flask render_template, we can pass the data or fetch it.
                // Let's assume we fetch a static JSON file or an API endpoint.
                // For simplicity, I'll fetch the JSON file which we'll serve via a route.
                const response = await fetch('/api/v1/evaluation-results');
                const data = await response.json();

                // Update Metrics
                document.getElementById('metricAccuracy').textContent = `${data.metrics.accuracy.toFixed(1)}%`;
                document.getElementById('metricTotal').textContent = data.metrics.total_tickets;
                document.getElementById('metricCorrect').textContent = data.metrics.correct_tickets;
                document.getElementById('metricLatency').textContent = `${data.metrics.avg_latency.toFixed(3)}s`;
                document.getElementById('lastRunTime').textContent = data.metrics.timestamp;

                // Update Table
                const tbody = document.getElementById('resultsTableBody');
                data.results.forEach(row => {
                    const tr = document.createElement('tr');
                    const isCorrect = row.correct;

                    tr.innerHTML = `
                        <td class="px-6 py-4 text-sm text-slate-900 max-w-xs truncate" title="${row.text}">${row.text}</td>
                        <td class="px-6 py-4 text-sm text-slate-500">${row.expected}</td>
                        <td class="px-6 py-4 text-sm font-medium ${isCorrect ? 'text-green-600' : 'text-red-600'}">${row.predicted}</td>
                        <td class="px-6 py-4 text-sm text-slate-500">${(row.confidence * 100).toFixed(0)}%</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${isCorrect ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                                ${isCorrect ? 'Pass' : 'Fail'}
                            </span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error('Failed to load evaluation results:', error);
            }
        });
    </script>
</body>

</html>
