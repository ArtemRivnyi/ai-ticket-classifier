<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Ticket Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body
    class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-white transition-colors duration-200 min-h-screen flex items-center justify-center p-4">
    <div
        class="w-full max-w-md bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-8 border border-slate-100 dark:border-slate-700 transition-colors duration-200">
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <a href="/" class="flex items-center gap-2 group">
                    <div class="bg-indigo-600 text-white p-2 rounded-lg group-hover:bg-indigo-700 transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2">
                            </path>
                        </svg>
                    </div>
                    <span class="text-xl font-bold text-slate-800 dark:text-white tracking-tight">Ticket<span
                            class="text-indigo-600 dark:text-indigo-400">AI</span></span>
                </a>
            </div>
            <h3 class="text-2xl font-bold text-slate-900 dark:text-white">Welcome Back</h3>
            <p class="text-slate-500 dark:text-slate-400">Sign in to your account</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email
                    address</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white dark:bg-slate-700 dark:text-white transition-colors"
                    placeholder="you@example.com">
            </div>
            <div>
                <label for="password"
                    class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Password</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white dark:bg-slate-700 dark:text-white transition-colors"
                    placeholder="••••••••">
            </div>
            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition transform hover:scale-[1.02] dark:bg-indigo-500 dark:hover:bg-indigo-600">
                Sign In
            </button>
        </form>

        <div class="mt-6 text-center space-y-2">
            <p class="text-sm text-slate-600 dark:text-slate-400">
                Don't have an account? <a href="/register"
                    class="text-indigo-600 hover:underline dark:text-indigo-400 font-medium">Register</a>
            </p>
            <p class="text-sm">
                <a href="/" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition">Back to
                    Home</a>
            </p>
        </div>
        <div id="alertMessage" class="mt-4 p-3 rounded-lg text-sm hidden"></div>
    </div>

    <!-- Theme Toggle (Fixed Position) -->
    <div class="fixed bottom-4 right-4">
        <button id="themeToggle"
            class="p-3 bg-white dark:bg-slate-800 rounded-full shadow-lg border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition">
            <span id="themeIcon">🌙</span>
        </button>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/auth.js"></script>
</body>

</html>
