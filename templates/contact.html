<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - AI Ticket Classifier</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-white transition-colors duration-200 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-3xl">
        <!-- Navbar -->
        <nav class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-2">
                <a href="/" class="flex items-center gap-2 group">
                    <div class="bg-indigo-600 text-white p-2 rounded-lg group-hover:bg-indigo-700 transition">
                        <button id="themeToggle"
                            class="p-2 text-slate-400 hover:text-indigo-600 dark:text-slate-500 dark:hover:text-indigo-400 transition"
                            title="Toggle Dark Mode">
                            <span id="themeIcon">🌙</span>
                        </button>
                    </div>
        </nav>

        <h1 class="text-3xl font-bold mb-6">Contact Us</h1>
        <p class="text-slate-600 dark:text-slate-400 mb-8">Have questions or need support? We're here to help.</p>

        <div
            class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-8 transition-colors duration-200">
            <form class="space-y-6">
                <div>
                    <label for="name"
                        class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Name</label>
                    <input type="text" id="name"
                        class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white dark:bg-slate-700 dark:text-white transition-colors"
                        placeholder="Your Name">
                </div>
                <div>
                    <label for="email"
                        class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email</label>
                    <input type="email" id="email"
                        class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white dark:bg-slate-700 dark:text-white transition-colors"
                        placeholder="you@example.com">
                </div>
                <div>
                    <label for="message"
                        class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Message</label>
                    <textarea id="message" rows="4"
                        class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white dark:bg-slate-700 dark:text-white transition-colors"
                        placeholder="How can we help?"></textarea>
                </div>
                <button type="button" onclick="alert('Thank you for your message! We will get back to you shortly.')"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg transition dark:bg-indigo-500 dark:hover:bg-indigo-600">Send
                    Message</button>
            </form>
        </div>

        <div class="mt-12 text-center text-slate-500 dark:text-slate-400 text-sm">
            <p>Or email us directly at <a href="mailto:artemrivnyi@outlook.com"
                    class="text-indigo-600 hover:underline dark:text-indigo-400">artemrivnyi@outlook.com</a></p>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
</body>

</html>
