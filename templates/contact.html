<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - AI Ticket Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Dark mode styles */
        .dark {
            background-color: #0f172a !important;
        }

        .dark nav {
            background-color: #1e293b !important;
            border-color: #334155 !important;
        }

        .dark .bg-white {
            background-color: #1e293b !important;
        }

        .dark .bg-slate-50 {
            background-color: #0f172a !important;
        }

        .dark .text-slate-800,
        .dark .text-slate-900 {
            color: #f1f5f9 !important;
        }

        .dark .text-slate-600,
        .dark .text-slate-700 {
            color: #cbd5e1 !important;
        }

        .dark .text-slate-500 {
            color: #94a3b8 !important;
        }

        .dark .border-slate-100,
        .dark .border-slate-200,
        .dark .border-slate-300 {
            border-color: #334155 !important;
        }

        .dark input,
        .dark textarea {
            background-color: #0f172a !important;
            color: #f1f5f9 !important;
            border-color: #334155 !important;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center gap-2 group">
                        <div class="bg-indigo-600 text-white p-2 rounded-lg group-hover:bg-indigo-700 transition">
                            <span class="text-2xl">🎫</span>
                        </div>
                        <span class="text-xl font-bold text-slate-800 hover:text-indigo-600 transition">AI Ticket
                            Classifier</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-slate-600 hover:text-indigo-600 font-medium transition">Home</a>
                    <a href="/about" class="text-slate-600 hover:text-indigo-600 font-medium transition">About</a>
                    <a href="/evaluation"
                        class="text-slate-600 hover:text-indigo-600 font-medium transition">Evaluation</a>
                    <a href="/docs" class="text-slate-600 hover:text-indigo-600 font-medium transition">API Docs</a>
                    <a href="https://github.com/ArtemRivnyi/ai-ticket-classifier" target="_blank"
                        class="text-slate-600 hover:text-indigo-600 font-medium transition">GitHub</a>
                    <button id="themeToggle"
                        class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition">
                        <span id="themeIcon" class="text-2xl">🌙</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-12 max-w-2xl">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-4">Contact Us</h1>
            <p class="text-lg text-slate-600">Have questions or need support? We're here to help.</p>
        </div>

        <div
            class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-8 transition-colors duration-200">
            <form class="space-y-6">
                <div>
                    <label for="name"
                        class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Name</label>
                    <input type="text" id="name"
                        class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white dark:bg-slate-700 dark:text-white transition-colors"
                        placeholder="Your Name">
                </div>
                <div>
                    <label for="email"
                        class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email</label>
                    <input type="email" id="email"
                        class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white dark:bg-slate-700 dark:text-white transition-colors"
                        placeholder="you@example.com">
                </div>
                <div>
                    <label for="message"
                        class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Message</label>
                    <textarea id="message" rows="4"
                        class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white dark:bg-slate-700 dark:text-white transition-colors"
                        placeholder="How can we help?"></textarea>
                </div>
                <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition transform hover:scale-[1.02]">
                    Send Message
                </button>
            </form>
        </div>

        <div class="mt-12 text-center text-slate-500 dark:text-slate-400 text-sm">
            <p>Or email us directly at <a href="mailto:artemrivnyi@outlook.com"
                    class="text-indigo-600 hover:underline dark:text-indigo-400">artemrivnyi@outlook.com</a></p>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 mt-12 py-8">
        <div class="container mx-auto px-4 text-center text-slate-500">
            <p>&copy; 2025 AI Ticket Classifier. Built with ❤️ by Artem Rivnyi.</p>
        </div>
    </footer>

    <script>
        // Theme toggle functionality
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const body = document.body;

        // Load saved theme preference
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            body.classList.add('dark');
            themeIcon.textContent = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark');
            const isDark = body.classList.contains('dark');
            themeIcon.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    </script>
</body>

</html>
