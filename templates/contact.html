<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - AI Ticket Classifier</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900">
    <div class="container mx-auto px-4 py-12 max-w-3xl">
        <div class="mb-8">
            <a href="/" class="text-indigo-600 hover:text-indigo-800 font-medium transition">&larr; Back to Home</a>
        </div>

        <h1 class="text-3xl font-bold mb-6">Contact Us</h1>
        <p class="text-slate-600 mb-8">Have questions or need support? We're here to help.</p>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
            <form class="space-y-6">
                <div>
                    <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Name</label>
                    <input type="text" id="name"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        placeholder="Your Name">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input type="email" id="email"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        placeholder="you@example.com">
                </div>
                <div>
                    <label for="message" class="block text-sm font-medium text-slate-700 mb-1">Message</label>
                    <textarea id="message" rows="4"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        placeholder="How can we help?"></textarea>
                </div>
                <button type="button" onclick="alert('Thank you for your message! We will get back to you shortly.')"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg transition">Send
                    Message</button>
            </form>
        </div>

        <div class="mt-12 text-center text-slate-500 text-sm">
            <p>Or email us directly at <a href="mailto:support@ticketai.com"
                    class="text-indigo-600 hover:underline">support@ticketai.com</a></p>
        </div>
    </div>
</body>

</html>
