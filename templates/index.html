<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ticket Classifier - Live Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .gradient-text {
            background: linear-gradient(to right, #4f46e5, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Dark mode styles */
        .dark {
            background-color: #0f172a !important;
        }

        .dark nav {
            background-color: #1e293b !important;
            border-color: #334155 !important;
        }

        .dark .bg-white {
            background-color: #1e293b !important;
        }

        .dark .bg-slate-50 {
            background-color: #0f172a !important;
        }

        .dark .text-slate-800,
        .dark .text-slate-900 {
            color: #f1f5f9 !important;
        }

        .dark .text-slate-600,
        .dark .text-slate-700 {
            color: #cbd5e1 !important;
        }

        .dark .text-slate-500 {
            color: #94a3b8 !important;
        }

        .dark .text-slate-400 {
            color: #64748b !important;
        }

        .dark .border-slate-100,
        .dark .border-slate-200 {
            border-color: #334155 !important;
        }

        .dark textarea,
        .dark input {
            background-color: #0f172a !important;
            color: #f1f5f9 !important;
            border-color: #334155 !important;
        }

        .dark #emptyState {
            background-color: #1e293b !important;
        }

        .theme-toggle {
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        /* Toast Notification */
        #toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 50;
        }

        .toast {
            transform: translateX(100%);
            transition: transform 0.3s ease-out;
        }

        .toast.show {
            transform: translateX(0);
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col">

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-2xl font-bold text-slate-800">🎫 AI Ticket Classifier</span>
                    <span id="systemStatus"
                        class="ml-3 px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-600"
                        title="Checking system status...">
                        ● Connecting...
                    </span>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="themeToggle"
                        class="theme-toggle p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition">
                        <span id="themeIcon" class="text-2xl">🌙</span>
                    </button>
                    <a href="/docs" class="text-slate-600 hover:text-indigo-600 font-medium transition">API Docs</a>
                    <a href="https://github.com/ArtemRivnyi/ai-ticket-classifier" target="_blank"
                        class="text-slate-600 hover:text-indigo-600 font-medium transition">GitHub</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-12 max-w-5xl">

        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 mb-4">
                Instant Support Ticket <span class="gradient-text">Classification</span>
            </h1>
            <p class="text-lg text-slate-600 max-w-2xl mx-auto">
                Powered by Google Gemini 2.0 Flash. Automatically categorize, prioritize, and route your support tickets
                with 100% accuracy.
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

            <!-- Input Section -->
            <div class="bg-white rounded-2xl shadow-xl p-6 border border-slate-100">
                <h2 class="text-xl font-semibold text-slate-800 mb-4">Try it yourself</h2>
                <form id="classifyForm" class="space-y-4">
                    <div>
                        <label for="ticketText" class="block text-sm font-medium text-slate-700 mb-1">Ticket
                            Content</label>
                        <textarea id="ticketText" rows="6"
                            class="w-full rounded-lg border-slate-300 border p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition resize-none"
                            placeholder="e.g., My internet connection keeps dropping every time I try to join a video call. I've tried restarting the router but it doesn't help."></textarea>
                    </div>
                    <div class="flex items-center justify-between">
                        <button type="button" id="fillSampleBtn"
                            class="text-sm text-indigo-600 hover:text-indigo-800 font-medium">
                            ✨ Fill with sample
                        </button>
                        <button type="submit"
                            class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-lg shadow-lg transition transform hover:scale-105 flex items-center">
                            <span id="btnText">Classify Ticket</span>
                            <svg id="btnSpinner" class="animate-spin ml-2 h-5 w-5 text-white hidden"
                                xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                                <p>&copy; 2025 AI Ticket Classifier. Built with ❤️ by Artem Rivnyi.</p>
                    </div>
                    </footer>

                    <script src="/static/js/app.js"></script>
                    <script>
                        // Theme toggle functionality
                        const themeToggle = document.getElementById('themeToggle');
                        const themeIcon = document.getElementById('themeIcon');
                        const body = document.body;

                        // Load saved theme preference
                        const savedTheme = localStorage.getItem('theme') || 'light';
                        if (savedTheme === 'dark') {
                            body.classList.add('dark');
                            themeIcon.textContent = '☀️';
                        }

                        themeToggle.addEventListener('click', () => {
                            body.classList.toggle('dark');
                            const isDark = body.classList.contains('dark');
                            themeIcon.textContent = isDark ? '☀️' : '🌙';
                            localStorage.setItem('theme', isDark ? 'dark' : 'light');
                        });
                    </script>
</body>

</html>
