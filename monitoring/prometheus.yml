global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ai-ticket-classifier'

scrape_configs:
  - job_name: 'classifier-api'
    static_configs:
      - targets: ['app:5000']  # Docker container
      - targets: ['host.docker.internal:5000']  # Local app (Windows/Mac)
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Redis doesn't export Prometheus metrics by default
  # Uncomment and configure redis_exporter if needed
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']