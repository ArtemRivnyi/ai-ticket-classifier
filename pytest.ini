[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov=middleware
    --cov=providers
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=50
    --maxfail=1
    -p no:warnings

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    redis: Tests requiring Redis
    ai: Tests requiring AI providers

# Coverage
[coverage:run]
source = app,middleware,providers
omit = 
    tests/*
    venv/*
    */site-packages/*

[coverage:report]
precision = 2
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:

