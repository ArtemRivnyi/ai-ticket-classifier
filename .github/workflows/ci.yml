name: CI/CD Pipeline

on:
  push:
    branches: [ GEMINI_API_PROD_READY ]
  pull_request:
    branches: [ GEMINI_API_PROD_READY ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        env:
          API_KEY: test_api_key_12345
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RATE_LIMIT_ENABLED: false
          CACHE_ENABLED: false
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install flake8 pylint black
      
      - name: Run flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Run pylint
        run: |
          pylint app.py --exit-zero
      
      - name: Check formatting with black
        run: |
          black --check .

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install safety bandit
      
      - name: Run safety check
        run: |
          safety check --json || true
      
      - name: Run bandit
        run: |
          bandit -r . -f json -o bandit-report.json || true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        run: |
          docker build -t ai-ticket-classifier:test .
          # Test health endpoint
          curl -f http://localhost:5000/api/v1/health || (docker logs test-container && exit 1)
          
          # Stop container
          docker stop test-container
          docker rm test-container
      
      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/GEMINI_API_PROD_READY'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Push to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/GEMINI_API_PROD_READY'
        run: |
          docker tag ai-ticket-classifier:test ${{ secrets.DOCKER_USERNAME }}/ai-ticket-classifier:latest
          docker tag ai-ticket-classifier:test ${{ secrets.DOCKER_USERNAME }}/ai-ticket-classifier:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-ticket-classifier:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-ticket-classifier:${{ github.sha }}

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/GEMINI_API_PROD_READY'
    
    steps:
      - name: Deploy to Render
        # Render auto-deploys on push to GEMINI_API_PROD_READY
        run: |
          echo "Deployment triggered for commit ${{ github.sha }}"
          echo "Render should auto-deploy this commit."
          # Optional: Trigger Render Deploy Hook if auto-deploy is disabled
          # curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
      
      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: 'Deployment ${{ job.status }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}