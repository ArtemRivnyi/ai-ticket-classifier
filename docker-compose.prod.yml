version: '3.8'

services:
  # Main App
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MASTER_API_KEY=${MASTER_API_KEY}
      - DATABASE_URL=postgresql://classifier:secure_pass@postgres:5432/classifier_db
      - REDIS_URL=redis://redis:6379
      - FLASK_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=classifier_db
      - POSTGRES_USER=classifier
      - POSTGRES_PASSWORD=secure_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U classifier"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Redis для rate limiting
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis_secure_pass
    volumes:
      - redis_data:/data
    restart: always

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: always

  # Grafana
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: always

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
